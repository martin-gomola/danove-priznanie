# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: push this file to the repo and create a Blueprint on Render.

services:
  - type: web
    name: danove-priznanie
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: TZ
        value: Europe/Bratislava
      - key: HOSTNAME
        value: 0.0.0.0
      # Analytics: set in Render dashboard (sync: false keeps values out of git).
      # Must be present at build time for Next.js to inline NEXT_PUBLIC_* vars.
      - key: NEXT_PUBLIC_ANALYTICS_SRC
        sync: false
      - key: NEXT_PUBLIC_ANALYTICS_ID
        sync: false
